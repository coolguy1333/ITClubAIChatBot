<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Steve — IT Club Display</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  #root {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: flex-end; align-items: center;
    padding: 16px; box-sizing: border-box;
  }
  #bubble {
    max-width: 92%;
    background: rgba(18, 18, 26, 0.92);
    border: 2px solid #7c5cff;
    border-radius: 18px;
    padding: 14px 18px;
    color: #f2f2f7;
    font-size: 22px;
    line-height: 1.35;
    box-shadow: 0 4px 24px rgba(124, 92, 255, 0.45);
    opacity: 0;
    transform: translateY(12px);
    transition: opacity .25s ease, transform .25s ease;
  }
  #bubble.show { opacity: 1; transform: translateY(0); }
  #caption {
    color: #b9a8ff; font-size: 15px; font-weight: 600;
    margin-bottom: 6px; letter-spacing: .3px;
    text-transform: uppercase;
  }
  #text { white-space: pre-wrap; word-wrap: break-word; }
  #badge {
    display: flex; align-items: center; gap: 8px;
    margin-top: 10px;
    color: #cfc6ff; font-size: 16px; font-weight: 700;
    text-shadow: 0 1px 4px rgba(0,0,0,.6);
  }
  #dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: #666; box-shadow: 0 0 6px rgba(0,0,0,.4);
  }
  #dot.live { background: #ff4655; box-shadow: 0 0 10px #ff4655; }
  #dot.connected { background: #40c463; box-shadow: 0 0 8px #40c463; }
</style>
</head>
<body>
<div id="root">
  <div id="bubble">
    <div id="caption"></div>
    <div id="text"></div>
  </div>
  <div id="badge"><div id="dot"></div><span id="name">STEVE</span></div>
</div>

<script>
let CFG = { bubbleHideDelay: 12, typewriterSpeed: 25, ttsEnabled: true, ttsRate: 1.05, ttsVoice: null };
let WS_PORT = 8788;
let hideTimer = null;
let queue = [];
let busy = false;

const bubble = document.getElementById('bubble');
const caption = document.getElementById('caption');
const textEl = document.getElementById('text');
const dot = document.getElementById('dot');

async function loadConfig() {
  try {
    const r = await fetch('/widget-config');
    const c = await r.json();
    Object.assign(CFG, c.widget || {});
    WS_PORT = CFG.wsPort || 8788;
  } catch (e) { console.warn('config load failed', e); }
}

function connect() {
  // use whatever host the widget was loaded from (localhost or a VM's IP)
  const ws = new WebSocket('ws://' + (location.hostname || '127.0.0.1') + ':' + WS_PORT);
  ws.onopen = () => { dot.className = 'connected'; };
  ws.onclose = () => { dot.className = ''; setTimeout(connect, 3000); };
  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    if (msg.type === 'steve' && msg.text) {
      queue.push(msg);
      processQueue();
    }
  };
}

async function processQueue() {
  if (busy || queue.length === 0) return;
  busy = true;
  const msg = queue.shift();
  await showMessage(msg);
  busy = false;
  processQueue();
}

function captionFor(msg) {
  if (msg.source === 'discord' && msg.user && msg.question) return msg.user + ' asks';
  if (msg.source === 'discord') return 'steve reacts';
  return '';
}

function speak(text) {
  return new Promise((resolve) => {
    if (!CFG.ttsEnabled || !window.speechSynthesis) return resolve();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = CFG.ttsRate || 1.0;
    if (CFG.ttsVoice) {
      const v = speechSynthesis.getVoices().find(v => v.name === CFG.ttsVoice);
      if (v) u.voice = v;
    }
    u.onend = resolve;
    u.onerror = resolve;
    speechSynthesis.speak(u);
    // safety: never hang the queue forever
    setTimeout(resolve, 30000 + text.length * 90);
  });
}

function typewriter(text) {
  return new Promise((resolve) => {
    textEl.textContent = '';
    let i = 0;
    const speed = Math.max(CFG.typewriterSpeed || 25, 1);
    const t = setInterval(() => {
      textEl.textContent = text.slice(0, ++i);
      if (i >= text.length) { clearInterval(t); resolve(); }
    }, speed);
  });
}

async function showMessage(msg) {
  clearTimeout(hideTimer);
  caption.textContent = captionFor(msg);
  caption.style.display = caption.textContent ? 'block' : 'none';
  bubble.classList.add('show');
  await Promise.all([typewriter(msg.text), speak(msg.text)]);
  hideTimer = setTimeout(() => bubble.classList.remove('show'),
                         (CFG.bubbleHideDelay || 12) * 1000);
}

(async () => {
  await loadConfig();
  // Chrome loads voices async; poke it once so getVoices() is populated
  if (window.speechSynthesis) speechSynthesis.getVoices();
  connect();
})();
</script>
</body>
</html>
